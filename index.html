<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7a2432">
<title>Taberna Puravida · Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── BASE ── */
:root{
  --wine:#7a2432;--wine-dk:#5a1a24;
  --bg:#f5f0ec;--surface:#fff;--surface2:#efe9e3;
  --border:#ddd5cb;--text:#1a1008;--muted:#7a6e65;
  --green:#2d7a4f;--red:#c0392b;--radius:12px;--wa:#25D366;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--wine);padding:0 16px;display:flex;align-items:center;height:60px;gap:12px;box-shadow:0 2px 12px rgba(90,26,36,.4)}
.topbar-logo{height:42px;object-fit:contain}
.topbar-right{margin-left:auto}
.badge-cart{background:#fff;color:var(--wine);font-weight:700;font-size:12px;padding:5px 12px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap;transition:transform .15s}
.badge-cart:hover{transform:scale(1.05)}
.badge-cart.hidden{display:none}

/* TABS */
.tabs-wrap{overflow-x:auto;scrollbar-width:none;padding:0 12px;border-bottom:2px solid var(--border);background:var(--surface);display:flex;gap:2px;min-height:44px;align-items:flex-end}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 13px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:var(--text);background:var(--surface2)}
.tab-btn.active{color:var(--wine);background:var(--bg);border-color:var(--border);font-weight:600;position:relative;top:2px}
.tab-btn .dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-left:4px;vertical-align:middle}

/* MAIN */
.main{padding:16px 14px 150px;max-width:700px;margin:0 auto}

/* PROV HEADER */
.prov-header{margin-bottom:14px;padding:14px 16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.prov-icon{width:42px;height:42px;border-radius:10px;background:var(--wine);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.prov-name{font-weight:700;font-size:15px}
.prov-sub{font-size:11px;color:var(--muted);margin-top:2px}
.prov-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-shrink:0}
.btn-icon{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{border-color:var(--wine);color:var(--wine)}
.prov-wa-btn{background:var(--wa);color:#fff;border:none;padding:8px 14px;border-radius:22px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform .15s;white-space:nowrap}
.prov-wa-btn:hover{transform:scale(1.04)}
.prov-wa-btn:disabled{opacity:.35;cursor:default;transform:none}

/* SEARCH */
.search-wrap{margin-bottom:12px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--wine)}
.search-wrap input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}

/* PRODUCT LIST */
.product-list{display:flex;flex-direction:column;gap:6px}
.product-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s,box-shadow .15s}
.product-item.has-qty{border-color:var(--wine);box-shadow:0 1px 8px rgba(122,36,50,.12)}
.product-info{flex:1;min-width:0}
.product-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px}
.product-price{color:var(--wine);font-weight:600}
.btn-ep{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-ep:hover{border-color:var(--wine);color:var(--wine)}
.qty-ctl{display:flex;align-items:center;background:var(--surface2);border-radius:9px;border:1px solid var(--border);overflow:hidden;flex-shrink:0}
.qb{width:34px;height:34px;border:none;background:transparent;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
.qb:hover{background:var(--border)}
.qb:active{background:var(--wine);color:#fff}
.qi{width:40px;height:34px;background:transparent;border:none;color:var(--text);text-align:center;font-weight:700;font-size:14px;outline:none}
.qi::-webkit-inner-spin-button{display:none}
.btn-add-prod{width:100%;padding:11px;border-radius:var(--radius);border:1px dashed var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s;margin-top:8px}
.btn-add-prod:hover{border-color:var(--wine);color:var(--wine)}

/* CART */
.cart-panel{position:fixed;bottom:0;z-index:200;background:var(--surface);border-top:2px solid var(--wine);padding:14px 18px env(safe-area-inset-bottom);width:100%;max-width:700px;left:50%;transform:translateX(-50%) translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 -4px 20px rgba(90,26,36,.15)}
.cart-panel.visible{transform:translateX(-50%) translateY(0)}
.cart-sum{display:flex;align-items:center;margin-bottom:12px}
.cart-n{font-weight:800;font-size:22px;color:var(--wine)}
.cart-lbl{font-size:12px;color:var(--muted);margin-left:8px}
.cart-acts{display:flex;gap:8px}
.btn-clr{flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s}
.btn-clr:hover{border-color:var(--red);color:var(--red)}
.btn-wa{flex:2;padding:12px;background:var(--wa);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .15s}
.btn-wa:hover{transform:scale(1.02)}

/* MODALS */
.mo{position:fixed;inset:0;z-index:500;background:rgba(26,16,8,.65);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.mo.open{display:flex}
.md{background:var(--surface);border-top:3px solid var(--wine);border-radius:18px 18px 0 0;padding:22px 18px 36px;width:100%;max-width:700px;animation:su .26s ease;max-height:92dvh;overflow-y:auto}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.mt{font-weight:700;font-size:17px;color:var(--wine);margin-bottom:4px}
.ms{font-size:12px;color:var(--muted);margin-bottom:16px}
.mp{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-bottom:14px;font-family:monospace}
.mn-lbl{font-size:11px;color:var(--muted);margin-bottom:5px}
.mn{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;outline:none;resize:none;margin-bottom:14px}
.mn:focus{border-color:var(--wine)}
.ma{display:flex;gap:9px}
.bc{flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer}
.bc:hover{border-color:var(--muted);color:var(--text)}
.bs{flex:2;padding:12px;background:var(--wa);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.bs:hover{opacity:.9}
.btn-pdf{flex:2;padding:12px;background:var(--wine);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s}
.btn-pdf:hover{opacity:.85}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;display:block;font-weight:600}
.fi{width:100%;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none}
.fi:focus{border-color:var(--wine)}
.fi::placeholder{color:var(--muted)}
.fr{display:flex;gap:10px}
.fr .fg{flex:1}
.bp{width:100%;padding:13px;background:var(--wine);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.bp:hover{opacity:.88}
.bdf{width:100%;padding:11px;background:transparent;border:1px solid var(--red);border-radius:10px;color:var(--red);font-size:13px;cursor:pointer;margin-top:10px}
.bdf:hover{background:var(--red);color:#fff}
.eg{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.eo{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.eo:hover,.eo.sel{border-color:var(--wine);background:rgba(122,36,50,.08)}

/* HISTORIAL */
.he{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.he div{font-size:40px;margin-bottom:12px}
.hi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:9px}
.hh{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.hp{font-weight:700;font-size:13px}
.hd{margin-left:auto;font-size:11px;color:var(--muted)}
.hpv{font-size:12px;color:var(--muted);line-height:1.6}
.ha{margin-top:11px;display:flex;gap:7px;flex-wrap:wrap}
.br{padding:6px 14px;border-radius:7px;background:var(--wa);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.bd{padding:6px 11px;border-radius:7px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;cursor:pointer}
.bd:hover{border-color:var(--red);color:var(--red)}
.btn-pdf-hist{padding:6px 14px;border-radius:7px;background:var(--wine);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}

/* CONFIG */
.cs{margin-bottom:22px}
.ct{font-weight:700;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:11px}
.cr{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.cn{flex:1;font-size:13px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cph{flex:1;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none}
.cph:focus{border-color:var(--wine)}
.cph::placeholder{color:var(--muted)}

/* SENDER BOX */
.sender-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.sender-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sender-btns{display:flex;flex-wrap:wrap;gap:8px}
.sender-btn{padding:8px 16px;border-radius:22px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
.sender-btn:hover{border-color:var(--wine);color:var(--wine)}
.sender-btn.active{background:var(--wine);border-color:var(--wine);color:#fff;font-weight:600}
.sender-add{padding:8px 16px;border-radius:22px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s}
.sender-add:hover{border-color:var(--wine);color:var(--wine)}

.nr{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.qpop{animation:pop .18s ease}
.toast{position:fixed;bottom:160px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--wine);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(90,26,36,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── PDF STYLES (solo cuando se imprime el albarán) ── */
#pdfFrame{display:none}
</style>
</head>

function load(){
  try{
    const d=localStorage.getItem('pv6_p'); provs=d?JSON.parse(d):JSON.parse(JSON.stringify(DD));
    const c=localStorage.getItem('pv6_c'); if(c) cons=JSON.parse(c);
    const q=localStorage.getItem('pv6_q'); if(q) qtys=JSON.parse(q);
    const h=localStorage.getItem('pv6_h'); if(h) hist=JSON.parse(h);
    const s=localStorage.getItem('pv6_s'); if(s) senders=JSON.parse(s);
    else senders=[];
    const cs=localStorage.getItem('pv6_cs'); if(cs) curSender=cs;
  } catch(e){provs=JSON.parse(JSON.stringify(DD));}
}
function SP(){localStorage.setItem('pv6_p',JSON.stringify(provs));}

function SQ(){localStorage.setItem('pv6_q',JSON.stringify(qtys));}
function SH(){localStorage.setItem('pv6_h',JSON.stringify(hist));}

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function qk(id,i){return id+'_'+i;}
function gQ(id,i){return parseInt(qtys[qk(id,i)]||0);}
function sQ2(id,i,v){
  v=Math.max(0,parseInt(v)||0);
  if(!v) delete qtys[qk(id,i)]; else qtys[qk(id,i)]=v;
  SQ(); uCart();
}
function gCart(id){
  const p=provs.find(x=>x.id===id); if(!p) return [];
  return p.productos.map((pr,i)=>({pr,i,q:gQ(id,i)})).filter(x=>x.q>0);
}
function fmtDate(ts){return new Date(ts).toLocaleDateString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function fmtDateLong(ts){
  return new Date(ts).toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gid(){return 'p'+Date.now()+'_'+Math.random().toString(36).slice(2,5);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

═══════════════════════════════════════════════════ */
function bMsg(id, note, sender){
  const p=provs.find(x=>x.id===id); if(!p) return '';
  const items=gCart(id); if(!items.length) return '';
  const d=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  let m='🍷 *PEDIDO TABERNA PURAVIDA*\n';
  m+='━━━━━━━━━━━━━━━━━━━\n';
  m+=`📅 ${d}\n`;
  m+=`🏪 Proveedor: *${p.nombre}*\n`;
  if(sender) m+=`👤 Enviado por: *${sender}*\n`;
  m+='\n';
  items.forEach(({pr,q})=>{const f=pr.formato?` (${pr.formato})`:''; m+=`• ${pr.nombre}${f}: *${q}*\n`;});
  m+='\n━━━━━━━━━━━━━━━━━━━\n';
  m+=`🏢 *${EMPRESA.nombre}*\n`;
  m+=`📍 ${EMPRESA.dir}, ${EMPRESA.cp}\n`;
  m+=`🆔 ${EMPRESA.cif}\n`;
  m+=`📧 ${EMPRESA.email}`;
  if(note&&note.trim()) m+=`\n\n📝 ${note.trim()}`;
  return m;
}

</div>

</html>`;

  // Abrir en nueva ventana y mandar a imprimir/guardar como PDF

  const win=window.open('','_blank');

v><div style="height:12px"></div><div style="font-size:10px;font-weight:700;color:#7a2432;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">Enviado por</div><div style="font-size:14px;font-weight:700;color:#1a1008">${curSender||'—'}</div></div></div><table style="width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden;border:1px solid #ddd5cb"><thead><tr style="background:#7a2432;color:#fff"><th style="padding:11px 14px;text-align:left;font-size:12px;font-weight:600;letter-spacing:.3px">PRODUCTO</th><th style="padding:11px 14px;text-align:left;font-size:12px;font-weight:600;letter-spacing:.3px">FORMATO</th><th style="padding:11px 14px;text-align:center;font-size:12px;font-weight:600;letter-spacing:.3px;width:80px">CANTIDAD</th></tr></thead><tbody>${rows}</tbody></table>${nn}<div style="margin-top:32px;padding-top:16px;border-top:1px solid #ddd5cb;display:flex;justify-content:space-between;align-items:center"><div style="font-size:11px;color:#7a6e65">Taberna Puravida · ${EMPRESA.email}</div><div style="font-size:11px;color:#7a6e65">Documento generado el ${new Date().toLocaleDateString('es-ES')}</div></div></div></body></html>`;

═══════════════════════════════════════════════════ */
function bEG(){document.getElementById('emojiGrid').innerHTML=ICONS.map(e=>`<div class="eo ${e===sIco?'sel':''}" onclick="pI('${e}')">${e}</div>`).join('');}
function pI(e){sIco=e;bEG();}
function oNPv(){ePvi=null;sIco='📦';document.getElementById('mProvT').textContent='Nuevo proveedor';document.getElementById('pvN').value='';document.getElementById('pvPh').value='';document.getElementById('btnDPv').style.display='none';bEG();document.getElementById('mProv').classList.add('open');setTimeout(()=>document.getElementById('pvN').focus(),250);}
function oEPv(i){ePvi=i;const p=provs[i];sIco=p.icon||'📦';document.getElementById('mProvT').textContent='Editar proveedor';document.getElementById('pvN').value=p.nombre;document.getElementById('pvPh').value=cons[p.id]||'';document.getElementById('btnDPv').style.display='block';bEG();document.getElementById('mProv').classList.add('open');}
document.getElementById('mProv').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('btnCPv').onclick=()=>document.getElementById('mProv').classList.remove('open');
document.getElementById('btnSPv').onclick=function(){
  const nb=document.getElementById('pvN').value.trim(); if(!nb){toast('⚠️ Escribe el nombre');return;}
  const ph=document.getElementById('pvPh').value.trim().replace(/\s/g,'');
  if(ePvi===null){const id=gid();provs.push({id,nombre:nb,icon:sIco,productos:[]});if(ph)cons[id]=ph;pi=provs.length-1;toast('✅ Proveedor añadido');}
  else{const p=provs[ePvi];p.nombre=nb;p.icon=sIco;if(ph)cons[p.id]=ph;else delete cons[p.id];toast('✅ Actualizado');}
  SP();SC();document.getElementById('mProv').classList.remove('open');view='pedidos';render();
};
document.getElementById('btnDPv').onclick=function(){
  if(!confirm('¿Eliminar este proveedor y todos sus productos?'))return;
  const p=provs[ePvi];p.productos.forEach((_,i)=>delete qtys[qk(p.id,i)]);
  provs.splice(ePvi,1);delete cons[p.id];
  SP();SC();SQ();pi=Math.max(0,Math.min(pi,provs.length-1));
  document.getElementById('mProv').classList.remove('open');toast('🗑 Proveedor eliminado');render();
};

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
load(); render();
